<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Process Scheduling Solver</title>
    <meta name="description" content="A tool to visualize and solve CPU process scheduling algorithms.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar card">
            <h2>Input</h2>
            
            <div class="form-group">
                <label for="algorithm">Algorithm</label>
                <div class="custom-select">
                    <select id="algorithm">
                        <option value="" disabled selected>Select Algorithm</option>
                        <option value="fcfs">First Come First Serve, FCFS</option>
                        <option value="sjf">Shortest Job First, SJF</option>
                        <option value="srtf">Shortest Remaining Time First, SRTF</option>
                        <option value="rr">Round Robin, RR</option>
                        <option value="priority">Priority (Non-Preemptive)</option>
                        <option value="priority_preemptive">Priority (Preemptive)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="arrival-times">Arrival Times</label>
                <input type="text" id="arrival-times" placeholder="0 2 4 6 8" value="">
            </div>

            <div class="form-group">
                <label for="burst-times">Burst Times</label>
                <input type="text" id="burst-times" placeholder="2 4 6 8 10" value="">
            </div>

            <div class="form-group" id="quantum-group" style="display: none;">
                <label for="time-quantum">Time Quantum</label>
                <input type="number" id="time-quantum" min="1" placeholder="2" value="">
            </div>

            <div class="form-group" id="priority-group" style="display: none;">
                <label for="priorities">Priorities (Lower number = Higher Priority)</label>
                <input type="text" id="priorities" placeholder="e.g. 1 2 3 4 5">
            </div>

            <button id="solve-btn" class="btn-primary">Solve</button>
            <div id="error-message" class="error-message"></div>
        </aside>

        <main class="output-area card">
            <div class="output-header">
                <h2>Output</h2>
                <span id="algo-badge" class="badge">FCFS</span>
            </div>

            <div id="output-content" class="hidden">
                <div class="gantt-section">
                    <h3>Gantt Chart</h3>
                    <div class="gantt-container">
                        <div id="gantt-chart" class="gantt-chart"></div>
                        <div id="gantt-timeline" class="gantt-timeline"></div>
                    </div>
                </div>

                <div class="table-section">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th>Job</th>
                                <th>Arrival Time</th>
                                <th>Burst Time</th>
                                <th>Finish Time</th>
                                <th>Turnaround Time</th>
                                <th>Waiting Time</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="4" class="text-right"><strong>Average</strong></td>
                                <td id="avg-turnaround"></td>
                                <td id="avg-waiting"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
            
            <div id="empty-state" class="empty-state">
                <p>Enter inputs and click Solve to see the results.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
